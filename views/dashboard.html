<div class="space-y-6 animate-fade-in w-full pb-8" id="dashboardContainer">
    <!-- ส่วนต้อนรับ (Welcome Section) -->
    <div class="bg-gradient-to-r from-[#1e3a8a] to-blue-600 rounded-2xl shadow-lg p-6 text-white flex flex-col md:flex-row items-center justify-between gap-6">
        <div class="flex items-center gap-5 w-full md:w-auto text-center md:text-left flex-col md:flex-row">
            <div id="dashProfileContainer" class="bg-white/20 p-4 rounded-full backdrop-blur-sm shadow-inner hidden md:flex items-center justify-center w-20 h-20 overflow-hidden shrink-0">
                <svg id="dashProfileIcon" xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                <img id="dashProfileImg" src="" alt="Profile Image" class="w-full h-full object-cover hidden" />
            </div>
            <div>
                <h2 class="text-2xl md:text-3xl font-bold mb-1">ยินดีต้อนรับ, <span id="dashName"></span></h2>
                <p class="text-blue-100 text-sm md:text-base opacity-90">รหัสนิสิต: <span id="dashStudentId"></span></p>
            </div>
        </div>
        <div class="w-full md:w-auto bg-white/10 p-4 rounded-xl text-center backdrop-blur-sm border border-white/20 flex flex-row md:flex-col justify-around md:justify-center items-center gap-4 md:gap-0 min-w-[160px]">
            <div>
                <p class="text-xs md:text-sm text-blue-100">หมายเลขห้อง</p>
                <p class="text-lg md:text-2xl font-bold text-white drop-shadow-sm" id="dashRoom">-</p>
            </div>        
        </div>
    </div>

    <!-- ข้อมูลค่าไฟเดือนล่าสุด (Electricity Bill) -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex flex-col w-full">
        <h3 class="text-lg font-bold text-[#1e3a8a] mb-5 flex items-center justify-between">
            <span class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                ค่าไฟฟ้าหอพักเดือนล่าสุด
            </span>
            <button onclick="document.getElementById('navElec')?.click()" class="text-sm font-medium text-blue-600 hover:text-blue-800 hover:underline">รายละเอียด</button>
        </h3>
        <div id="dashElecContainer" class="flex-1 flex flex-col justify-center items-center text-slate-500 min-h-[180px] bg-slate-50 rounded-xl border border-slate-100 p-4">
            <svg class="animate-spin h-8 w-8 text-blue-600 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-sm animate-pulse">กำลังโหลดข้อมูลค่าไฟ...</p>
        </div>
    </div>

    <!-- สถานะการแจ้งซ่อมที่กำลังดำเนินการ (Active Repairs) -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex flex-col w-full">
        <h3 class="text-lg font-bold text-[#1e3a8a] mb-5 flex items-center justify-between">
            <span class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.83-5.83M15.17 11.42a7.11 7.11 0 01-4.83 1.91 7.127 7.127 0 01-7.18-7.18 7.11 7.11 0 011.91-4.83m10.1 10.1a7.11 7.11 0 001.91-4.83 7.127 7.127 0 00-7.18-7.18 7.11 7.11 0 00-4.83 1.91" />
                </svg>
                รายการแจ้งซ่อมหอพักที่กำลังดำเนินการ
            </span>
            <button onclick="document.getElementById('navRepair')?.click()" class="text-sm font-medium text-blue-600 hover:text-blue-800 hover:underline">แจ้งซ่อมเพิ่ม</button>
        </h3>
        <div id="dashActiveRepairsContainer" class="flex-1 flex flex-col text-slate-500 min-h-[180px] bg-slate-50 rounded-xl border border-slate-100 p-4">
            <div class="flex flex-col justify-center items-center h-full w-full py-8">
                <svg class="animate-spin h-8 w-8 text-blue-600 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-sm animate-pulse">กำลังโหลดรายการแจ้งซ่อม...</p>
            </div>
        </div>
    </div>
</div>
