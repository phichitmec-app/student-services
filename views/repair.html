<div class="bg-white p-6 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold text-primary mb-4">ฟอร์มแจ้งซ่อม</h2>
    <div id="repairFormContainer">
        <!-- Repair form will be rendered here by js/repair.js -->
    </div>
    <div id="uploadStatus" class="mt-4 text-center text-sm text-blue-600 hidden">
        กำลังอัปโหลดไฟล์... กรุณารอสักครู่
    </div>
</div>

<div class="bg-white p-6 rounded-lg shadow-md mt-6">
    <h2 class="text-2xl font-bold text-primary mb-4">ประวัติการแจ้งซ่อม</h2>
    <div id="repairHistoryContainer" class="overflow-x-auto">
        <div class="text-center text-slate-500 py-4" id="repairHistoryLoading">
            กำลังโหลดข้อมูล...
        </div>
        <table class="min-w-full bg-white border border-slate-200 hidden" id="repairHistoryTable">
            <thead class="bg-slate-50">
                <tr>
                    <th class="py-2 px-4 border-b text-left text-sm font-semibold text-slate-700 whitespace-nowrap">วันที่แจ้ง</th>
                    <th class="py-2 px-4 border-b text-left text-sm font-semibold text-slate-700 min-w-[200px]">รายละเอียด</th>
                    <th class="py-2 px-4 border-b text-center text-sm font-semibold text-slate-700 whitespace-nowrap">รูปภาพ</th>
                    <th class="py-2 px-4 border-b text-center text-sm font-semibold text-slate-700 whitespace-nowrap">สถานะ</th>
                </tr>
            </thead>
            <tbody id="repairHistoryBody" class="divide-y divide-slate-200 text-sm">
                <!-- Rows will be added here -->
            </tbody>
        </table>
        <div id="repairHistoryEmpty" class="text-center text-slate-500 py-4 hidden">
            ไม่มีประวัติการแจ้งซ่อม
        </div>
    </div>
</div>
