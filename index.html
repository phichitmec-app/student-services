<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบให้บริการนิสิต</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#1e3a8a', secondary: '#3b82f6' } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap');

        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            width: 1.5rem;
            height: 1.5rem;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="text-slate-800 h-full">

    <header class="bg-primary text-white p-4 shadow-md sticky top-0 z-30 shrink-0">
        <div class="w-full max-w-7xl mx-auto flex justify-between items-center px-4">          
            <div class="flex items-center gap-4">
                <img src="https://lh5.googleusercontent.com/d/1kHjp4nBT4V1Lk5bdA-HWzFBYFP6sqYqs" alt="Logo" class="h-16 mr-4">
                <h1 class="text-xl md:text-2xl font-bold">Phichit MEC Student Services
                </h1>
            </div>
            <div id="userProfile" class="hidden text-sm flex items-center">
                <span>ผู้ใช้งาน: <span id="displayUserName" class="font-bold"></span></span>
                <button onclick="confirmLogout()"
                    class="ml-4 bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-white transition shadow">ออกจากระบบ</button>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-hidden w-full bg-[#f8fafc]" id="app">
        <div id="loginWrapper" class="container mx-auto max-w-5xl p-4 mt-10 h-full overflow-y-auto">
            <div id="loginSection" class="max-w-md mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
            <div class="bg-primary p-6 text-center text-white">
                <h2 class="text-2xl font-semibold">เข้าสู่ระบบ</h2>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">เลขประจำตัวประชาชน (CID)</label>
                    <input type="text" id="loginCid"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-secondary outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">รหัสนิสิต (Student Number)</label>
                    <input type="password" id="loginStudentId"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-secondary outline-none">
                </div>
                <button id="btnLogin" onclick="login()"
                    class="w-full bg-secondary hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition duration-200 flex justify-center items-center">
                    <span id="loginBtnText">เข้าสู่ระบบ</span>
                    <div id="loginSpinner" class="spinner hidden ml-2"></div>
                </button>
            </div>
            </div>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz2UVDYKbRk9C4Z45rBCSuS8MKeEfvJpTKDtfzeDyUWl1rpJt3B0dVjF54EIBsRht0hAA/exec";

        let currentRowData = [];
        let currentRowIndex = -1;
    </script>
    <script src="js/studentdata.js"></script>
    <script src="js/internet.js"></script>
    <script src="js/repair.js"></script>
    <script src="js/electricity.js"></script>
    <script src="js/download.js"></script>
    <script src="js/home.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
